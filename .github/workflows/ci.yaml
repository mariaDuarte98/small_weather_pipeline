name: CI

on:
  push:
    branches: ["main", "fix/**", "feat/**", "improve/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Run tests
        env:
          VC_API_KEY: "test-key-not-real"
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
